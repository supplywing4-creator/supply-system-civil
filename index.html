<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* รักษา Style เดิมของคุณไว้ */
    .header-box { background: #007bff; color: white; padding: 20px; text-align: center; position: relative; }
    .logo-img { position: absolute; right: 20px; top: 10px; width: 100px; }
    th { background-color: #004085 !important; color: white !important; text-align: center; }
    .btn-add { color: #28a745; cursor: pointer; font-size: 1.2rem; }
  </style>
</head>
<body>

<div class="header-box">
  <h2>ระบบตรวจสอบพัสดุภายในหน่วย</h2>
  <h4>สายช่างโยธา <i class="fa-solid fa-screwdriver-wrench"></i></h4>
  <img src="https://lh3.googleusercontent.com/d/1WXw920em0NyiUIofpUZcAoV80yc_sge8" class="logo-img">
</div>

<div class="container mt-4">
  <div class="card p-3 shadow-sm">
    <div class="row">
      <div class="col-md-5">
        <label>เลือกหน่วยงาน</label>
        <select id="unitSelect" class="form-select">
          <option value="1">ฝคก.บน.4</option>
          </select>
      </div>
      <div class="col-md-5">
        <label>เลือกประเภทพัสดุ</label>
        <select id="typeSelect" class="form-select">
          <option value="AIR">เครื่องปรับอากาศ</option>
        </select>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button onclick="performSearch()" class="btn btn-primary w-100">ค้นหา</button>
      </div>
    </div>
  </div>

  <div id="resultArea" class="mt-4"></div>
</div>

<div class="modal fade" id="noteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5>บันทึกสถานที่ติดตั้ง</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <textarea id="locationInput" class="form-control" rows="3" placeholder="ระบุสถานที่..."></textarea>
        <input type="hidden" id="currentRowIndex">
      </div>
      <div class="modal-footer"><button onclick="saveLocation()" class="btn btn-success">บันทึก</button></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let currentData = [];
  const scriptUrl = "https://script.google.com/macros/s/AKfycbzp9h4WvzztjUElzry14Fo6DyoI1QpNf5rwQrkz4R9wEFMSV7aV6vtrINiNd3PXHBTbzQ/exec";

  async function performSearch() {
    const unit = document.getElementById('unitSelect').value;
    const resultArea = document.getElementById('resultArea');
    resultArea.innerHTML = "กำลังดึงข้อมูล...";
    
    try {
      const resp = await fetch(`${scriptUrl}?unit=${unit}`);
      currentData = await resp.json();
      renderTable();
    } catch (e) { resultArea.innerHTML = "ข้อผิดพลาด: Failed to fetch"; }
  }

  function renderTable() {
    let html = '<table class="table table-bordered shadow-sm"><thead><tr>';
    html += '<th>หน่วยงาน</th><th>หมายเลขพัสดุ</th><th>ชื่อพัสดุ</th><th>จำนวน</th><th>หน่วยนับ</th><th>S/N</th><th>ดูเอกสาร</th><th>สถานที่ติดตั้ง</th></tr></thead><tbody>';
    
    currentData.forEach((row, index) => {
      html += `<tr>
        <td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td><td>${row[5]}</td>
        <td class="text-center"><a href="${row[6]}" target="_blank"><i class="fa-solid fa-file-pdf text-danger"></i></a></td>
        <td class="text-center"><i class="fa-solid fa-circle-plus btn-add" onclick="openModal(${index})"></i></td>
      </tr>`;
    });
    document.getElementById('resultArea').innerHTML = html + '</tbody></table>';
  }

  function openModal(index) {
    document.getElementById('currentRowIndex').value = index;
    new bootstrap.Modal(document.getElementById('noteModal')).show();
  }

  async function saveLocation() {
    const idx = document.getElementById('currentRowIndex').value;
    const loc = document.getElementById('locationInput').value;
    const unit = document.getElementById('unitSelect').value;
    const pId = currentData[idx][1];

    // ส่งข้อมูลไปบันทึก
    fetch(`${scriptUrl}?action=save&unit=${unit}&parcelId=${encodeURIComponent(pId)}&location=${encodeURIComponent(loc)}`, { mode: 'no-cors' });
    alert("ส่งข้อมูลบันทึกแล้ว");
    bootstrap.Modal.getInstance(document.getElementById('noteModal')).hide();
  }
</script>
</body>
</html>
