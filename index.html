<!DOCTYPE html>
<html lang="th">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f7ff; margin: 0; padding: 0; }
        .header-box { background: linear-gradient(135deg, #003399, #0066cc, #0099ff); color: white; padding: 40px 0; border-bottom: 5px solid #ffcc00; display: flex; justify-content: center; align-items: center; min-height: 250px; }
        .header-container { width: 95%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; }
        .header-title-left { font-size: clamp(1.8rem, 4vw, 3.5rem); font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .sub-title-civil { font-size: clamp(1.5rem, 3.5vw, 3rem); font-weight: bold; color: #FFB347; }
        .logo { max-width: clamp(120px, 15vw, 204px); }
        .search-container { background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); margin-top: -30px; position: relative; z-index: 10; }
        .btn-search { background-color: #0056b3; color: white; }
        .file-icon { color: #dc3545; font-size: 1.6rem; cursor: pointer; transition: 0.2s; }
        .file-icon:hover { transform: scale(1.2); }
        .add-note-icon { color: #28a745; font-size: 1.6rem; cursor: pointer; transition: 0.2s; }
        .add-note-icon:hover { transform: scale(1.3); }
        th { background-color: #003399 !important; color: white !important; text-align: center; vertical-align: middle; white-space: nowrap; }
        td { text-align: center; vertical-align: middle; background-color: rgba(255,255,255,0.85) !important; }
        .modal-dialog { max-width: 90% !important; margin: 0; position: absolute; top: 50px; left: 50%; transform: translateX(-50%); }
        .modal-content { height: 80vh; border: 2px solid #0066cc; }
        #noteModal .modal-dialog { max-width: 400px !important; height: auto; top: 20%; transform: none; left: auto; position: relative; }
        #noteModal .modal-content { height: auto; border-radius: 15px; }
    </style>
</head>
<body>

<div class="header-box">
    <div class="header-container">
        <div>
            <div class="header-title-left">ระบบตรวจสอบพัสดุภายในหน่วย</div>
            <div class="sub-title-civil">สายช่างโยธา <i class="fa-solid fa-screwdriver-wrench"></i></div>
        </div>
        <img src="https://drive.google.com/thumbnail?id=1WXw920em0NyiUIofpUZcAoV80yc_sge8&sz=w500" class="logo">
    </div>
</div>

<div class="container mb-5">
    <div class="search-container no-print">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">เลือกหน่วยงาน</label>
                <select id="unitSelect" class="form-select">
                    <option value="1">ฝคก.บน.4</option><option value="2">ฝูง.401 บน.4</option>
                    <option value="3">ฝูง.402 บน.4</option><option value="4">ฝูง.403 บน.4</option>
                    <option value="5">บก.บน.4</option><option value="6">พัน.อย.บน.4</option>
                    <option value="7">ผพธ.บน.4</option><option value="8">มว.บชพ.กทน.บน.4</option>
                    <option value="9">ผชอ.กทน.บน.4</option><option value="10">ผสอ.กทน.บน.4</option>
                    <option value="11">ผสพ.กทน.บน.4</option><option value="12">ผชย.บน.4</option>
                    <option value="13">ผขส.บน.4</option><option value="14">รพ.กองบิน บน.4</option>
                    <option value="15">ผสก.บน.4</option><option value="16">ร้อย.ทสห.บน.4</option>
                    <option value="17">ผกง.บน.4</option><option value="18">ผนบ.บน.4</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">เลือกประเภทพัสดุ</label>
                <select id="searchInput" class="form-select">
                    <option value="AIR">เครื่องปรับอากาศ</option>
                    <option value="OTHER">อื่นๆ</option>
                </select>
            </div>
            <div class="col-12 text-center mt-3 border-top pt-3">
                <button onclick="performSearch()" class="btn btn-search px-5 py-2 fw-bold">ค้นหา</button>
            </div>
        </div>
    </div>

    <div id="paginationTop" class="mt-4 d-flex justify-content-between align-items-center" style="display:none !important;">
        <div>
            <span class="fw-bold">แสดงหน้าละ:</span>
            <select id="rowsPerPage" class="form-select d-inline-block w-auto ms-2" onchange="changeRowsPerPage()">
                <option value="20">20</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
            <span class="ms-2" id="totalItemsText"></span>
        </div>
    </div>

    <div id="resultArea" class="table-responsive mt-2"></div>
</div>

<div class="modal fade" id="pdfModal" tabindex="-1">
    <div class="modal-dialog modal-xl" id="draggableModal">
        <div class="modal-content">
            <div class="modal-header d-flex justify-content-between align-items-center" id="modalHeader">
                <h5 class="modal-title">เอกสารพัสดุ (PDF)</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <iframe id="pdfViewer" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="noteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title"><i class="fa-solid fa-location-dot"></i> สถานที่ติดตั้ง</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <label class="form-label fw-bold">ระบุรายละเอียดการติดตั้ง:</label>
                <textarea id="locationInput" class="form-control" rows="4" placeholder="กรอกข้อมูลที่นี่..."></textarea>
                <input type="hidden" id="currentRowIndex">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="button" class="btn btn-success px-4" onclick="saveLocation()">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let currentData = [];
let currentPage = 1;
let rowsPerPage = 20;

function changeRowsPerPage() {
    const val = document.getElementById('rowsPerPage').value;
    rowsPerPage = parseInt(val);
    currentPage = 1;
    renderTable();
}

async function performSearch() {
    const unit = document.getElementById('unitSelect').value;
    const resultArea = document.getElementById('resultArea');
    resultArea.innerHTML = '<div class="text-center p-5"><div class="spinner-border text-primary"></div><br><br>กำลังดึงข้อมูล...</div>';
    
    try {
        const response = await fetch(`https://script.google.com/macros/s/AKfycbzp9h4WvzztjUElzry14Fo6DyoI1QpNf5rwQrkz4R9wEFMSV7aV6vtrINiNd3PXHBTbzQ/exec?unit=${unit}&search=`);
        currentData = await response.json();
        renderTable();
        document.getElementById('paginationTop').style.setProperty('display', 'flex', 'important');
    } catch (err) { resultArea.innerHTML = "เกิดข้อผิดพลาดในการโหลดข้อมูล"; }
}

function renderTable() {
    const resultArea = document.getElementById('resultArea');
    const start = (currentPage - 1) * rowsPerPage;
    const end = start + rowsPerPage;
    const paginatedData = currentData.slice(start, end);

    let html = '<table class="table table-bordered table-hover"><thead><tr><th>เลือก</th><th>หน่วยงาน</th><th>หมายเลขพัสดุ</th><th>ชื่อพัสดุ</th><th>จำนวน</th><th>หน่วยนับ</th><th>S/N</th><th>ดูเอกสาร</th><th>สถานที่ติดตั้ง</th></tr></thead><tbody>';
    
    paginatedData.forEach((row, localIndex) => {
        const globalIndex = start + localIndex;
        html += `<tr><td><input type="checkbox" class="form-check-input row-checkbox" data-index="${globalIndex}"></td>`;
        for (let i = 0; i < 6; i++) { html += `<td>${row[i] || '-'}</td>`; }
        
        let pdfLinkRaw = row[6] ? row[6].toString().trim() : '';
        let btnHtml = (pdfLinkRaw && pdfLinkRaw.includes('http')) ? `<i class="fa-solid fa-file-pdf file-icon" onclick="viewPDF('${pdfLinkRaw.replace('/view?usp=sharing', '/preview')}')"></i>` : '-';
        
        html += `<td>${btnHtml}</td>`;
        // ปุ่มเครื่องหมาย + สีเขียว
        html += `<td><i class="fa-solid fa-circle-plus add-note-icon" onclick="openNoteModal(${globalIndex})"></i></td></tr>`;
    });
    
    resultArea.innerHTML = html + '</tbody></table>';
    document.getElementById('totalItemsText').innerText = `จากทั้งหมด ${currentData.length} รายการ`;
}

function openNoteModal(index) {
    document.getElementById('currentRowIndex').value = index;
    document.getElementById('locationInput').value = "";
    new bootstrap.Modal(document.getElementById('noteModal')).show();
}

function saveLocation() {
    const index = document.getElementById('currentRowIndex').value;
    const locationValue = document.getElementById('locationInput').value;
    const unitValue = document.getElementById('unitSelect').value;
    const rowData = currentData[index];

    if (!locationValue.trim()) return alert("กรุณากรอกข้อมูล");

    google.script.run.withSuccessHandler(function(res) {
        if(res === "Success") {
            alert("บันทึกเรียบร้อย");
            bootstrap.Modal.getInstance(document.getElementById('noteModal')).hide();
        } else { alert("เกิดข้อผิดพลาด: " + res); }
    }).updateLocationToColumnJ(unitValue, rowData[1], locationValue);
}

function viewPDF(link) {
    document.getElementById('pdfViewer').src = link;
    new bootstrap.Modal(document.getElementById('pdfModal')).show();
}
</script>
</body>
</html>
