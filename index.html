<!DOCTYPE html>
<html lang="th">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f7ff; margin: 0; padding: 0; }
        .header-box { background: linear-gradient(135deg, #003399, #0066cc); color: white; padding: 40px 0; border-bottom: 5px solid #ffcc00; text-align: center; }
        .search-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-top: -30px; }
        th { background-color: #003399 !important; color: white !important; text-align: center; }
        td { text-align: center; vertical-align: middle; }
        .file-icon { color: #dc3545; font-size: 1.5rem; cursor: pointer; }
        .btn-add-loc { color: #28a745; cursor: pointer; }
        .modal-xl { max-width: 90%; }
        .pdf-container { width: 100%; height: 500px; border: none; }
    </style>
</head>
<body>

<div class="header-box">
    <h1>ระบบตรวจสอบพัสดุสายช่างโยธา</h1>
</div>

<div class="container mb-5">
    <div class="search-container">
        <div class="row g-3">
            <div class="col-md-5">
                <label class="form-label fw-bold">เลือกหน่วยงาน</label>
                <select id="unitSelect" class="form-select">
                    <option value="1">ฝคก.บน.4</option><option value="2">ฝูง.401 บน.4</option><option value="3">ฝูง.402 บน.4</option>
                    <option value="4">ฝูง.403 บน.4</option><option value="5">บก.บน.4</option><option value="6">พัน.อย.บน.4</option>
                    <option value="7">ผพธ.บน.4</option><option value="8">มว.บชพ.กทน.บน.4</option><option value="9">ผชอ.กทน.บน.4</option>
                    <option value="10">ผสอ.กทน.บน.4</option><option value="11">ผสพ.กทน.บน.4</option><option value="12">ผชย.บน.4</option>
                    <option value="13">ผขส.บน.4</option><option value="14">รพ.กองบิน บน.4</option><option value="15">ผสก.บน.4</option>
                    <option value="16">ร้อย.ทสห.บน.4</option><option value="17">ผกง.บน.4</option><option value="18">ผนบ.บน.4</option>
                </select>
            </div>
            <div class="col-md-5">
                <label class="form-label fw-bold">ประเภทพัสดุ</label>
                <select id="searchInput" class="form-select">
                    <option value="AIR">เครื่องปรับอากาศ</option>
                    <option value="OTHER">อื่นๆ</option>
                </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button onclick="performSearch()" class="btn btn-primary w-100 fw-bold">ค้นหา</button>
            </div>
        </div>
    </div>

    <div id="resultArea" class="table-responsive mt-4"></div>
</div>

<div class="modal fade" id="locationModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">บันทึกสถานที่ติดตั้ง</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <textarea id="locationInput" class="form-control" rows="3"></textarea>
                <input type="hidden" id="targetIndex">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" onclick="submitLocation()">บันทึก</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="pdfModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">เอกสาร PDF</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <iframe id="pdfViewer" class="pdf-container"></iframe>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let currentData = [];
const scriptUrl = "https://script.google.com/macros/s/AKfycbz18NnwBA7XRRhR7XwsTsHrJ8255ZYt-tg8Xn-smx1P7xXQUK7lwPM83Brs3HKk4SMZEg/exec";

async function performSearch() {
    const unit = document.getElementById('unitSelect').value;
    const resultArea = document.getElementById('resultArea');
    resultArea.innerHTML = "กำลังค้นหา...";
    try {
        const resp = await fetch(`${scriptUrl}?unit=${unit}&search=`);
        currentData = await resp.json();
        renderTable();
    } catch (e) { resultArea.innerHTML = "ไม่พบข้อมูลหรือเกิดข้อผิดพลาด"; }
}

function renderTable() {
    let html = '<table class="table table-bordered bg-white"><thead><tr><th>หน่วยงาน</th><th>หมายเลขพัสดุ</th><th>ชื่อพัสดุ</th><th>จำนวน</th><th>หน่วยนับ</th><th>S/N</th><th>ดูเอกสาร</th><th>สถานที่ติดตั้ง</th></tr></thead><tbody>';
    currentData.forEach((row, idx) => {
        html += `<tr>
            <td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td><td>${row[5]}</td>
            <td><i class="fa-solid fa-file-pdf file-icon" onclick="viewPDF('${row[6]}')"></i></td>
            <td><span id="loc-${idx}">${row[7]}</span> <i class="fa-solid fa-circle-plus btn-add-loc ms-2" onclick="openLoc(${idx})"></i></td>
        </tr>`;
    });
    document.getElementById('resultArea').innerHTML = html + '</tbody></table>';
}

function openLoc(idx) {
    document.getElementById('targetIndex').value = idx;
    document.getElementById('locationInput').value = currentData[idx][7];
    new bootstrap.Modal(document.getElementById('locationModal')).show();
}

async function submitLocation() {
    const idx = document.getElementById('targetIndex').value;
    const loc = document.getElementById('locationInput').value;
    const unit = document.getElementById('unitSelect').value;
    const pId = currentData[idx][1];
    await fetch(`${scriptUrl}?action=save&unit=${unit}&parcelId=${pId}&location=${encodeURIComponent(loc)}`, {mode:'no-cors'});
    document.getElementById(`loc-${idx}`).innerText = loc;
    currentData[idx][7] = loc;
    bootstrap.Modal.getInstance(document.getElementById('locationModal')).hide();
}

function viewPDF(link) {
    document.getElementById('pdfViewer').src = link.replace('/view?usp=sharing', '/preview');
    new bootstrap.Modal(document.getElementById('pdfModal')).show();
}
</script>
</body>
</html>
