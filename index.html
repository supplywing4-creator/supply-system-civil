<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบพัสดุภายในหน่วย - สายงานช่างโยธา</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 🎨 Theme เดิมคงไว้ */
        html { font-size: 16px; }
        body {
            margin: 0;
            padding: 0 40px; 
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #334155 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
        }

        /* 🎬 Animations */
        @keyframes slideFromRight { 0% { opacity: 0; transform: translateX(30px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes slideFromBottom { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes growVertical { 0% { opacity: 0; transform: scaleY(0); } 100% { opacity: 1; transform: scaleY(1); } }
        @keyframes fadeInRoof { 0% { opacity: 0; transform: scaleX(0.5); } 100% { opacity: 1; transform: scaleX(1); } }
        
        /* Animation สำหรับไอคอน NEW */
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* 🛠️ Main Layout */
        .main-wrapper {
            display: flex;
            flex-direction: row;
            justify-content: space-between; 
            align-items: center;
            width: 100%;
            max-width: 1400px; 
            box-sizing: border-box;
            gap: 80px; 
            padding: 20px;
            margin-bottom: 50px;
        }

        .warehouse-roof-container { width: 100%; display: flex; justify-content: center; margin-bottom: 2px; animation: fadeInRoof 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .warehouse-roof { width: 100px; height: 14px; background: #FFB03A; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }

        .content-group-left { display: flex; flex-direction: column; align-items: center; text-align: center; flex: 1.3; min-width: 0; animation: slideFromRight 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .main-title { font-family: 'Sarabun', sans-serif; font-size: 3.8rem; font-weight: bold; color: #FFFFFF; line-height: 1.1; width: 100%; }
        .sub-title { font-family: 'Sarabun', sans-serif; font-size: 2.2rem; color: #FFB03A; margin-top: 8px; display: flex; align-items: center; gap: 12px; }

        .menu-dashboard-container { display: flex; flex-direction: row; gap: 25px; margin-top: 40px; flex-wrap: wrap; justify-content: center; }
        .menu-link { display: inline-block; text-decoration: none; position: relative; border-radius: 50%; width: 160px; height: 160px; background: #111827; box-shadow: 0 4px 0 #000, 0 8px 0 #0F172A, 0 15px 20px rgba(0, 0, 0, 0.5); transform: translateY(-8px); transition: transform 0.2s ease, box-shadow 0.2s ease; overflow: hidden; flex-shrink: 0; }
        .menu-link img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; transition: filter 0.2s ease; }
        .menu-link:hover { transform: translateY(-4px); box-shadow: 0 4px 0 #000, 0 6px 12px rgba(0, 0, 0, 0.4); }
        .menu-link:active { transform: translateY(0px); box-shadow: 0 1px 0 #000, 0 3px 8px rgba(0, 0, 0, 0.3); }
        .menu-link.menu-2 { cursor: not-allowed; filter: grayscale(50%) opacity(0.7); }

        .vertical-divider { width: 2px; background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.2) 20%, rgba(255, 255, 255, 0.2) 80%, transparent); align-self: stretch; min-height: 300px; animation: growVertical 1s ease-in-out forwards; }

        .right-side-container { display: flex; flex-direction: column; align-items: flex-start; flex: 1; min-width: 350px; animation: slideFromBottom 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .logo-right img { width: 220px; height: auto; margin-bottom: 20px; }
        .contact-box { font-family: 'Sarabun', sans-serif; color: #FFFFFF; }
        .contact-title { font-size: 1.7rem; font-weight: bold; color: #FFB03A; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .contact-item { font-size: 1.3rem; line-height: 1.5; margin-bottom: 6px; }
        .contact-item i { color: #38BDF8; margin-right: 8px; }
        .line-join-box { margin-top: 15px; }
        .line-qr-image { width: 90px; height: 90px; border-radius: 10px; background: white; padding: 5px; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* 📣 ใหม่: ประชาสัมพันธ์แบบข้อความลอยตัว (Floating Text) */
        .announcement-wrapper {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 999;
            font-family: 'Sarabun', sans-serif;
            max-width: 400px;
        }
        .announcement-header {
            color: #FFB03A;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.8;
        }
        #announce-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .announce-item {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.08); /* พื้นหลังโปร่งแสง */
            backdrop-filter: blur(8px); /* เอฟเฟกต์กระจกฝ้า */
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .announce-item:hover {
            background: rgba(255, 176, 58, 0.2);
            border-color: #FFB03A;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        /* ไอคอน NEW!! */
        .new-tag {
            color: #FF4B4B;
            font-weight: 800;
            font-size: 0.75rem;
            margin-left: 10px;
            background: rgba(255, 75, 75, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 75, 75, 0.3);
            animation: blink 1.5s infinite;
            white-space: nowrap;
        }

        .developer-credit { position: absolute; bottom: 20px; right: 25px; font-family: 'Sarabun', sans-serif; font-size: 1.1rem; color: rgba(255,255,255,0.4); user-select: none; }

        @media (max-width: 1024px) {
            .main-wrapper { flex-direction: column; gap: 40px; padding: 40px 20px; margin-bottom: 80px; }
            .vertical-divider { width: 80%; height: 2px; min-height: auto; }
            .right-side-container { align-items: center; text-align: center; }
            .announcement-wrapper { position: relative; left: 0; bottom: 0; margin: 20px auto; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- ฝั่งซ้ายเมนูหลัก -->
        <div class="content-group-left">
            <div class="warehouse-roof-container"><div class="warehouse-roof"></div></div>
            <div class="main-title">ระบบพัสดุภายในหน่วย</div>
            <div class="sub-title"><i class="fa-solid fa-screwdriver-wrench"></i> สายงานช่างโยธา</div>
            
            <div class="menu-dashboard-container">
                <a href="https://script.google.com/macros/s/AKfycbzZtL6RpDAPosNvF3LUunHRiviu5Xz9Snx9TbL0lP5KwJRlzoZocWOIOKLLoMXcCmpd/exec" target="_blank" class="menu-link">
                    <img src="https://drive.google.com/thumbnail?id=1LA2glst0bkn812cw4OekgVktj1fqRber&sz=w500" alt="Supply Portal">
                </a>
                <a href="#" class="menu-link menu-2" onclick="alert('ระบบกำลังอยู่ระหว่างการพัฒนา'); return false;">
                    <img src="https://drive.google.com/thumbnail?id=1-xlKQFulxAlRSsxv4zXJ299OmbTnT3LX&sz=w500" alt="Maintenance">
                </a>
                <a href="https://drive.google.com/drive/folders/1JlT1KbMISegO6GKaH64dR9UFXPojQeKE?usp=drive_link" target="_blank" class="menu-link">
                    <img src="https://drive.google.com/thumbnail?id=19mv7jLUXghHubjYMs0AF7Uqz_hzGw_3m&sz=w500" alt="Folders">
                </a>
            </div>
        </div>

        <div class="vertical-divider"></div>

        <!-- ฝั่งขวาข้อมูลติดต่อ -->
        <div class="right-side-container">
            <div class="logo-right">
                <img src="https://drive.google.com/thumbnail?id=1WXw920em0NyiUIofpUZcAoV80yc_sge8&sz=w500" alt="Logo">
            </div>
            <div class="contact-box">
                <div class="contact-title"><i class="fa-solid fa-building-shield"></i> ติดต่อสอบถามข้อมูล</div>
                <div class="contact-item"><i class="fa-solid fa-phone"></i> ฝ่ายคลังพัสดุรวมการ บน.4 โทร. 5-3422</div>
                <div class="contact-item"><i class="fa-solid fa-phone"></i> หัวหน้าฝ่ายคลังพัสดุรวมการ โทร. 5-3420</div>
                <div class="line-join-box contact-item">
                    <div style="font-size: 1rem; color: #38BDF8; margin-bottom: 8px;">
                        <i class="fa-brands fa-line" style="color: #06C755;"></i> เข้าร่วมกลุ่ม LINE สอบถามข้อมูล
                    </div>
                    <a href="https://line.me/R/ti/g/WxndXMcenn" target="_blank">
                        <img src="https://drive.google.com/thumbnail?id=1EBIFiS2x2raYgwZJcXETraLvsRbPpPJZ&sz=w300" class="line-qr-image" alt="Line QR">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- ส่วนประชาสัมพันธ์แบบข้อความลอยตัว -->
    <div class="announcement-wrapper">
        <div class="announcement-header">
            <i class="fa-solid fa-bullhorn"></i> ล่าสุด
        </div>
        <div id="announce-list">
            <!-- ข้อมูลจะถูกโหลดตรงนี้ -->
        </div>
    </div>

    <div class="developer-credit">จัดทำโดย จ.ท.นิรันดร์ ศรีนาม</div>

    <script>
        // ใส่ลิงก์ Web App (Google Apps Script) ของคุณที่นี่
        const API_URL = "https://script.google.com/macros/s/AKfycbxvzrm83iqAPP8PcoxubPQpLksI0U2Tdw5b3qZ2aVM5Iuod16XlRlNZP6Sv_1oXn884/exec"; 

        async function loadAnnouncements() {
            const list = document.getElementById('announce-list');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (!data || data.length === 0) {
                    list.innerHTML = '<div style="color: rgba(255,255,255,0.4); font-size: 0.9rem;">ไม่มีข่าวสารใหม่</div>';
                    return;
                }

                list.innerHTML = '';
                data.forEach(item => {
                    const a = document.createElement('a');
                    a.className = 'announce-item';
                    a.href = item.link || '#';
                    a.target = '_blank';
                    
                    // ใส่ข้อความ และไอคอน NEW!! ต่อท้าย
                    a.innerHTML = `
                        <span>${item.title}</span>
                        <span class="new-tag">NEW!!</span>
                    `;
                    list.appendChild(a);
                });

            } catch (err) {
                console.error("Fetch Error:", err);
                list.innerHTML = '<div style="color: #ef4444; font-size: 0.85rem;">Failed to fetch announcements</div>';
            }
        }

        window.onload = loadAnnouncements;
    </script>
</body>
</html>
